<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPU Monitor</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>

    </div>
    <script src="/static/app.js" type="module"></script>

</html>
