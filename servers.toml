# GPU Monitor configuration.
#
# All servers share this polling interval.
poll_interval_seconds = 20

# Minimal form: use an existing Host entry from your SSH config.
# The value of Host should match ~/.ssh/config or %USERPROFILE%\.ssh\config.
[[servers]]
Host = "server-a"

# Full form: write connection details directly in this file.
# You can mix this with SSH config entries and omit keys already defined there.
[[servers]]
Host = "server-b"
HostName = "10.0.0.12"
User = "your_username"
Port = 22
IdentityFile = "~/.ssh/id_rsa"
